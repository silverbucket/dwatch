# Cut a release from GitHub: Actions → Release → Run workflow (no local git required).
# Bumps from the latest published release tag; works with protected master (no direct push).
# See release.md.
# Opens a PR to sync the Makefile after publishing.
name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Bump from latest release (e.g. v1.3.0 + patch → v1.3.1)"
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.0
        with:
          ref: master
          persist-credentials: false

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.21"
          cache: true

      - name: Compute release version
        id: meta
        env:
          BUMP: ${{ inputs.bump }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          LATEST_TAG=$(gh release list --limit 20 --exclude-drafts --exclude-pre-releases \
            --json tagName --jq '[.[].tagName | select(test("^v[0-9]+\\.[0-9]+\\.[0-9]+$"))][0] // empty')
          if [ -n "${LATEST_TAG}" ]; then
            CURRENT="${LATEST_TAG#v}"
            echo "Latest published release: ${LATEST_TAG}"
          else
            CURRENT=$(sed -n 's/^VERSION ?=[[:space:]]*//p' Makefile | head -1)
            echo "No releases yet; using Makefile VERSION=${CURRENT}"
          fi
          if [ -z "${CURRENT}" ]; then
            echo "Could not determine current version"
            exit 1
          fi
          if ! [[ "${CURRENT}" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Current version must be X.Y.Z (got: ${CURRENT})"
            exit 1
          fi
          MAJOR="${BASH_REMATCH[1]}"
          MINOR="${BASH_REMATCH[2]}"
          PATCH="${BASH_REMATCH[3]}"
          case "${BUMP}" in
            patch) PATCH=$((PATCH + 1)) ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            *)
              echo "Invalid bump: ${BUMP}"
              exit 1
              ;;
          esac
          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          TAG="v${VERSION}"
          echo "Bump: ${BUMP} → releasing ${VERSION}"
          if git ls-remote --exit-code origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists on remote"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "previous=${CURRENT}" >> "$GITHUB_OUTPUT"

      - name: Check release does not exist
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists"
            exit 1
          fi

      - name: Run tests
        run: |
          go test ./... -count=1
          go vet ./...

      - name: Build release archives
        env:
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          LDFLAGS="-s -w -X dwatch/cmd.Version=${VERSION}"
          mkdir -p dist

          build() {
            local goos=$1 goarch=$2
            local base="dwatch_${TAG}_${goos}_${goarch}"
            echo "Building ${goos}/${goarch}..."
            GOOS=$goos GOARCH=$goarch CGO_ENABLED=0 go build -ldflags "${LDFLAGS}" -o dwatch .
            tar -czf "dist/${base}.tar.gz" dwatch
            rm dwatch
            sha256sum "dist/${base}.tar.gz" | tee -a dist/SHA256SUMS
          }

          build linux arm64
          build linux amd64
          build darwin arm64
          build darwin amd64

      - name: Publish GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.4.2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          target_commitish: master
          files: dist/*
          generate_release_notes: true
          overwrite_files: false

      - name: Open Makefile sync pull request
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.meta.outputs.version }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail
          CURRENT=$(sed -n 's/^VERSION ?=[[:space:]]*//p' Makefile | head -1)
          if [ "${CURRENT}" = "${VERSION}" ]; then
            echo "Makefile already at ${VERSION}; no PR needed"
            exit 0
          fi
          BRANCH="chore/bump-version-${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          sed -i "s/^VERSION ?=.*/VERSION ?= ${VERSION}/" Makefile
          git add Makefile
          git commit -m "chore: bump VERSION to ${VERSION}"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${BRANCH}"
          gh pr create \
            --base master \
            --head "${BRANCH}" \
            --title "chore: bump VERSION to ${VERSION}" \
            --body "Automated after ${TAG}. Merge to keep the Makefile in sync with the latest release."
          gh pr merge --auto --squash || echo "Enable auto-merge on the PR or merge manually"
