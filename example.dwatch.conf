# dwatch configuration
# This file is read from ~/.dwatch/dwatch.conf

# Directory where snapshots are stored
data_dir = ~/.dwatch

# Root directory to scan
scan_root = /

# Maximum directory depth to track
scan_depth = 5

# Paths to exclude from scanning (comma-separated)
# macOS defaults:
scan_skip = /dev, /Volumes, /System/Volumes, /net
# Linux defaults:
# scan_skip = /proc, /sys, /dev, /run
